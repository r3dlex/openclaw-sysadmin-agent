services:
  iamq:
    build: ./iamq
    restart: unless-stopped
    environment:
      IAMQ_HTTP_URL: http://host.docker.internal:18790
      IAMQ_WS_URL: ws://host.docker.internal:18793/ws
      IAMQ_AGENT_ID: sysadmin_agent
      IAMQ_AGENT_NAME: Sysadmin Agent
      IAMQ_AGENT_EMOJI: "🖥️"
      IAMQ_AGENT_DESC: Manages system administration tasks, monitoring, and infrastructure
      IAMQ_AGENT_CAPABILITIES: monitor_systems,manage_services,check_logs,deploy_infra
    extra_hosts:
      - "host.docker.internal:host-gateway"
