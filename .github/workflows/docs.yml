name: Docs

on:
  push:
    branches: [main]
    paths:
      - "**.md"
  pull_request:
    branches: [main]
    paths:
      - "**.md"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-links:
    name: Check Internal Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify internal markdown links resolve
        run: |
          ISSUES=0
          for md in $(find . -name '*.md' -not -path './.git/*'); do
            # Extract [text](relative-path) links — must contain / or .md to be a file ref
            grep -oP '\]\(\K[^)]+' "$md" 2>/dev/null \
              | grep -v '^http' \
              | grep -v '^#' \
              | grep -E '/|\.\w+$' \
              | while read -r link; do
                dir=$(dirname "$md")
                target="$dir/$link"
                if [ ! -e "$target" ]; then
                  echo "::warning file=$md::Broken link: $link"
                  ISSUES=$((ISSUES + 1))
                fi
              done
          done
          echo "Link check complete"

      - name: Check for TODO/FIXME markers
        run: |
          if git grep -n 'TODO\|FIXME\|HACK\|XXX' -- '*.md' | grep -v 'PIPELINES\|TESTING'; then
            echo "::warning::Found TODO/FIXME markers in docs"
          else
            echo "OK: No stale TODO markers"
          fi
