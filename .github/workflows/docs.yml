name: Docs

on:
  push:
    branches: [main]
    paths:
      - "**.md"
  pull_request:
    branches: [main]
    paths:
      - "**.md"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-docs:
    name: Check Docs (Python pipeline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install .

      - name: Run docs pipeline
        run: python -m tools.pipeline_runner docs
