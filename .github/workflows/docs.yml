name: Docs

on:
  push:
    branches: [main]
    paths:
      - "**.md"
  pull_request:
    branches: [main]
    paths:
      - "**.md"

permissions:
  contents: read

jobs:
  check-links:
    name: Check Internal Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify internal markdown links resolve
        run: |
          EXIT=0
          # Extract markdown links like [text](path) and backtick references like `path/FILE.md`
          for md in $(find . -name '*.md' -not -path './.git/*'); do
            # Check [text](relative-path) links
            grep -oP '\]\(\K[^)]+' "$md" 2>/dev/null | grep -v '^http' | grep -v '^#' | while read -r link; do
              dir=$(dirname "$md")
              target="$dir/$link"
              if [ ! -e "$target" ]; then
                echo "::warning file=$md::Broken link: $link"
                EXIT=1
              fi
            done
          done
          if [ "$EXIT" -eq 0 ]; then
            echo "OK: All internal links resolve"
          fi

      - name: Check for TODO/FIXME markers
        run: |
          if git grep -n 'TODO\|FIXME\|HACK\|XXX' -- '*.md' | grep -v 'PIPELINES\|TESTING'; then
            echo "::warning::Found TODO/FIXME markers in docs"
          else
            echo "OK: No stale TODO markers"
          fi
