name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate (Python pipeline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and dev dependencies
        run: pip install ".[dotenv]" ruff

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run validate pipeline
        run: python -m tools.pipeline_runner validate

  docker-build:
    name: Docker Build (watchdog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build watchdog container
        run: docker build -t openclaw-watchdog-test watchdog/

      - name: Verify container starts
        run: |
          docker run -d --name watchdog-test openclaw-watchdog-test
          sleep 3
          docker logs watchdog-test 2>&1 | head -5
          docker stop watchdog-test
          docker rm watchdog-test
          echo "OK: Container builds and starts"
